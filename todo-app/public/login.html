<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · 나의 할 일</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('todo-theme');
        if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-container">
    <div class="auth-topbar">
      <button type="button" id="theme-toggle" class="icon-btn" aria-label="테마 전환">🌙</button>
    </div>
    <div class="auth-card">
      <h1 class="auth-title">나의 할 일</h1>

      <div class="auth-tabs">
        <button type="button" id="tab-login" class="auth-tab active">로그인</button>
        <button type="button" id="tab-signup" class="auth-tab">회원가입</button>
      </div>

      <form id="auth-form" autocomplete="off">
        <label class="auth-field">
          <span>아이디</span>
          <input type="text" id="username" placeholder="아이디 (2~20자)" required />
        </label>
        <label class="auth-field">
          <span>비밀번호</span>
          <input type="password" id="password" placeholder="비밀번호 (영문·숫자 4자 이상)" required />
        </label>
        <p id="auth-error" class="auth-error" hidden></p>
        <button type="submit" id="auth-submit" class="auth-submit">로그인</button>
      </form>

      <p id="auth-hint" class="auth-hint"></p>
    </div>
  </main>

  <script src="theme.js"></script>
  <script src="login.js"></script>
</body>
</html>
