<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 할 일</title>
  <script>
    // 렌더 전에 테마 적용 → 깜빡임 방지
    (function () {
      try {
        var t = localStorage.getItem('todo-theme');
        if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="app-header">
      <h1>나의 할 일</h1>
      <div class="user-box">
        <span id="user-name" class="user-name"></span>
        <button type="button" id="theme-toggle" class="icon-btn" aria-label="테마 전환">🌙</button>
        <button type="button" id="logout-btn" class="logout-btn">로그아웃</button>
      </div>
    </div>

    <form id="add-form" autocomplete="off">
      <input type="text" id="title-input" placeholder="할 일을 입력하세요" required />
      <div class="form-row">
        <label class="field">
          <span>마감일</span>
          <input type="date" id="due-input" />
        </label>
        <label class="field">
          <span>태그 (쉼표로 구분)</span>
          <input type="text" id="tags-input" placeholder="예: 공부, 집안일" />
        </label>
        <button type="submit" id="add-btn">추가</button>
      </div>
    </form>

    <!-- AI 자연어 추가 (API 키 있을 때만 표시) -->
    <div id="ai-box" class="ai-box" hidden>
      <span class="ai-badge">🤖 AI</span>
      <input type="text" id="ai-input" placeholder="예: 내일까지 팀 회의 자료 준비 — AI가 제목·마감일·태그로 정리해요" />
      <button type="button" id="ai-add-btn">AI로 추가</button>
    </div>

    <div class="toolbar">
      <input type="search" id="search-input" placeholder="검색어를 입력하세요" />
      <button type="button" id="today-btn" class="chip">오늘 할 일</button>
      <button type="button" id="ai-summary-btn" class="chip" hidden>🤖 AI 정리</button>
    </div>

    <div id="ai-summary" class="ai-summary" hidden></div>

    <div id="tag-chips" class="tag-chips"></div>

    <ul id="todo-list"></ul>
    <p id="empty-msg" class="empty" hidden>할 일이 없습니다.</p>
  </main>

  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
