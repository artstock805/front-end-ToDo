# Fly.io 앱 설정
# app 이름은 전 세계에서 고유해야 합니다. 이미 쓰이는 이름이면 배포 시 다른 이름으로 바꾸세요.
app = "sehwan-todo-app"
primary_region = "nrt"   # nrt = 도쿄 (한국에서 가장 가까움)

[build]

[env]
  PORT = "3456"
  DB_PATH = "/data/todo.db"

# 영구 볼륨: SQLite 데이터를 /data 에 저장해 재배포/재시작에도 보존
[mounts]
  source = "todo_data"
  destination = "/data"

[http_service]
  internal_port = 3456
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150
